<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WeatherTheme</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
  }
  /* 底层风景图：全屏 cover 适配竖屏 */
  #bg-image {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
    transition: opacity 1.2s ease-in-out;
    will-change: opacity;
  }
  /* 兜底渐变（图片加载中或失败时显示） */
  #bg-fallback {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(180deg, #1a3a5c 0%, #2d5f5d 50%, #466b4c 100%);
    transition: background 1.5s ease;
  }
  /* Canvas 粒子层：透明叠加在图片上层，不拦截事件 */
  #particle-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }
  /* 闪电全屏闪光层（雷暴） */
  #lightning-flash {
    position: fixed;
    inset: 0;
    z-index: 3;
    background: transparent;
    pointer-events: none;
    mix-blend-mode: screen;
  }
  /* 夜晚色调蒙版（增强夜景氛围） */
  #night-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: transparent;
    pointer-events: none;
    transition: background 1.5s ease;
  }
  /* 调试信息（默认隐藏） */
  #debug-info {
    position: fixed;
    top: env(safe-area-inset-top, 0px);
    left: 8px;
    z-index: 10;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.7);
    background: rgba(0, 0, 0, 0.5);
    padding: 4px 8px;
    border-radius: 4px;
    display: none;
    pointer-events: none;
    font-family: monospace;
  }
</style>
</head>
<body>
  <div id="bg-fallback"></div>
  <img id="bg-image" alt="" />
  <div id="night-overlay"></div>
  <canvas id="particle-canvas"></canvas>
  <div id="lightning-flash"></div>
  <div id="debug-info">初始化中...</div>

<script>
(function() {
  'use strict';

  const CONFIG = {
    weatherCacheTTL: 30 * 60 * 1000,
    imageCacheTTL: 6 * 60 * 60 * 1000,
    pexelsApiKey: '',
    debug: false,
  };

  /* ---------- 天气-关键词映射表 ---------- */
  const WEATHER_KEYWORD_MAP = {
    'clear-dawn':      'sunrise mountain landscape',
    'clear-day':       'clear blue sky landscape',
    'clear-dusk':      'sunset golden hour landscape',
    'clear-night':     'starry night sky landscape',
    'cloudy-dawn':     'cloudy sunrise landscape',
    'cloudy-day':      'partly cloudy sky landscape',
    'cloudy-dusk':     'cloudy sunset landscape',
    'cloudy-night':    'cloudy night sky landscape',
    'overcast-dawn':   'overcast sky morning landscape',
    'overcast-day':    'overcast sky landscape',
    'overcast-dusk':   'overcast sunset landscape',
    'overcast-night':  'overcast night landscape',
    'fog-dawn':        'foggy morning forest landscape',
    'fog-day':         'foggy landscape mountains',
    'fog-dusk':        'foggy sunset landscape',
    'fog-night':       'foggy night landscape',
    'drizzle-dawn':    'light rain morning landscape',
    'drizzle-day':     'light rain landscape',
    'drizzle-dusk':    'light rain sunset landscape',
    'drizzle-night':   'light rain night landscape',
    'rain-dawn':       'rainy morning landscape',
    'rain-day':        'rainy day landscape',
    'rain-dusk':       'rainy sunset landscape',
    'rain-night':      'rainy night street landscape',
    'heavy-rain-dawn': 'heavy rain storm landscape',
    'heavy-rain-day':  'heavy rain storm landscape',
    'heavy-rain-dusk': 'heavy rain storm sunset',
    'heavy-rain-night':'heavy rain night storm',
    'snow-dawn':       'snowy morning landscape',
    'snow-day':        'snowy landscape mountains',
    'snow-dusk':       'snowy sunset landscape',
    'snow-night':      'snowy night landscape',
    'thunderstorm-dawn':  'thunderstorm lightning landscape',
    'thunderstorm-day':   'thunderstorm lightning landscape',
    'thunderstorm-dusk':  'thunderstorm sunset lightning',
    'thunderstorm-night': 'thunderstorm night lightning',
  };

  const WMO_CODE_MAP = {
    0:'clear',1:'clear',2:'cloudy',3:'overcast',
    45:'fog',48:'fog',
    51:'drizzle',53:'drizzle',55:'drizzle',56:'drizzle',57:'drizzle',
    61:'rain',63:'rain',65:'heavy-rain',66:'rain',67:'heavy-rain',
    71:'snow',73:'snow',75:'snow',77:'snow',
    80:'rain',81:'rain',82:'heavy-rain',85:'snow',86:'snow',
    95:'thunderstorm',96:'thunderstorm',99:'thunderstorm',
  };

  function getTimePeriod(sunrise, sunset, now) {
    if (!sunrise || !sunset) {
      const h = new Date(now).getHours();
      if (h >= 5 && h < 8) return 'dawn';
      if (h >= 8 && h < 17) return 'day';
      if (h >= 17 && h < 20) return 'dusk';
      return 'night';
    }
    const sr = new Date(sunrise).getTime();
    const ss = new Date(sunset).getTime();
    const t = now;
    if (t >= sr - 30*60*1000 && t < sr + 60*60*1000) return 'dawn';
    if (t >= sr + 60*60*1000 && t < ss - 60*60*1000) return 'day';
    if (t >= ss - 60*60*1000 && t < ss + 30*60*1000) return 'dusk';
    return 'night';
  }

  const Cache = {
    get(key, ttl) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (Date.now() - data.cachedAt > ttl) return null;
        return data.value;
      } catch { return null; }
    },
    set(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify({ value, cachedAt: Date.now() }));
      } catch {}
    }
  };

  const State = {
    location: null,
    weather: null,
    sunrise: null,
    sunset: null,
    period: 'day',
    weatherKey: 'clear-day',
    particleCount: 80,
    refreshTimer: null,
  };

  const $bgImage = document.getElementById('bg-image');
  const $bgFallback = document.getElementById('bg-fallback');
  const $nightOverlay = document.getElementById('night-overlay');
  const $lightning = document.getElementById('lightning-flash');
  const $debug = document.getElementById('debug-info');
  const $canvas = document.getElementById('particle-canvas');
  const ctx = $canvas.getContext('2d');

  function debug(msg) {
    if (CONFIG.debug) {
      $debug.style.display = 'block';
      $debug.textContent = msg;
      console.log('[WeatherTheme]', msg);
    }
  }

  function detectPerformance() {
    const memory = navigator.deviceMemory || 4;
    const cores = navigator.hardwareConcurrency || 4;
    if (memory <= 2 || cores <= 2) State.particleCount = 30;
    else if (memory <= 4 || cores <= 4) State.particleCount = 60;
    else State.particleCount = 100;
  }

  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    $canvas.width = window.innerWidth * dpr;
    $canvas.height = window.innerHeight * dpr;
    $canvas.style.width = window.innerWidth + 'px';
    $canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
  }

  async function fetchWeather(lat, lng) {
    const cacheKey = `weather_${lat.toFixed(2)}_${lng.toFixed(2)}`;
    const cached = Cache.get(cacheKey, CONFIG.weatherCacheTTL);
    if (cached) return cached;
    try {
      const params = new URLSearchParams({
        latitude: lat.toString(),
        longitude: lng.toString(),
        current: 'weather_code,temperature_2m,is_day',
        daily: 'sunrise,sunset',
        timezone: 'auto',
      });
      const resp = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      const code = data.current?.weather_code ?? 0;
      const type = WMO_CODE_MAP[code] || 'cloudy';
      const weather = {
        type, code,
        temperature: Math.round(data.current?.temperature_2m ?? 20),
        isDay: data.current?.is_day === 1,
      };
      State.sunrise = data.daily?.sunrise?.[0] || null;
      State.sunset = data.daily?.sunset?.[0] || null;
      Cache.set(cacheKey, weather);
      debug(`天气: ${type} (${code}) ${weather.temperature}°C`);
      return weather;
    } catch (e) {
      debug('天气获取失败: ' + e.message);
      return null;
    }
  }

  /* ---------- Pexels 图片获取（纯在线模式，优先 4K） ---------- */
  async function fetchPexelsImage(keyword) {
    if (!CONFIG.pexelsApiKey) {
      debug('无 Pexels Key，使用兜底渐变');
      return null;
    }
    const cacheKey = `pexels_${keyword}`;
    const cached = Cache.get(cacheKey, CONFIG.imageCacheTTL);
    if (cached) {
      debug('图片(缓存): ' + keyword);
      return cached;
    }
    try {
      // size=large 过滤保证返回的是大图，per_page=1 取首张并优先 large2x(≈4K)
      const resp = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(keyword)}&orientation=landscape&size=large&per_page=1`, {
        headers: { 'Authorization': CONFIG.pexelsApiKey }
      });
      if (resp.status === 429) {
        debug('Pexels 配额耗尽');
        return null;
      }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      const photo = data.photos?.[0];
      if (!photo) throw new Error('无图片结果');
      // 优先 large2x（约 4K，2~5MB，画质与体积平衡最佳）
      // 降级 original（原图，可能 >10MB，加载慢）
      // 再降级 large（约 1080p）
      const url = photo.src?.large2x || photo.src?.original || photo.src?.large;
      if (!url) throw new Error('无可用尺寸');
      Cache.set(cacheKey, url);
      debug('图片(Pexels 4K): ' + keyword);
      return url;
    } catch (e) {
      debug('Pexels 失败: ' + e.message);
      return null;
    }
  }

  async function loadBackground(weatherType, period) {
    const key = `${weatherType}-${period}`;
    State.weatherKey = key;
    const keyword = WEATHER_KEYWORD_MAP[key] || WEATHER_KEYWORD_MAP['clear-day'];
    const imgUrl = await fetchPexelsImage(keyword);

    if (!imgUrl) {
      debug('无图片URL，走兜底渐变: ' + key);
      showFallback(weatherType, period);
      return;
    }

    // 若 URL 未变，无需重载
    if ($bgImage.src === imgUrl && $bgImage.naturalWidth > 0) {
      $bgImage.style.opacity = '1';
      return;
    }

    // 直接用显示用的 <img> 加载，不设置 crossOrigin（仅显示用，不读像素）
    // crossOrigin='anonymous' 在 WebView 中若 CDN 无 CORS 头会导致加载失败
    return new Promise((resolve) => {
      let resolved = false;
      const done = (ok) => {
        if (resolved) return;
        resolved = true;
        if (!ok) showFallback(weatherType, period);
        resolve(ok);
      };

      $bgImage.onload = () => {
        $bgImage.style.opacity = '1';
        debug('图片已显示: ' + key);
        done(true);
      };
      $bgImage.onerror = () => {
        debug('图片加载失败: ' + imgUrl);
        done(false);
      };

      // 先淡出（若已有旧图），再切换 src
      if ($bgImage.src) $bgImage.style.opacity = '0';
      $bgImage.src = imgUrl;

      // 超时兜底（15s，4K 图加载较慢）
      setTimeout(() => {
        if (!resolved) {
          if ($bgImage.complete && $bgImage.naturalWidth > 0) {
            $bgImage.style.opacity = '1';
            done(true);
          } else {
            done(false);
          }
        }
      }, 15000);
    });
  }

  function showFallback(weatherType, period) {
    const gradients = {
      'clear-dawn':      'linear-gradient(180deg, #ff9a76 0%, #ffd1a3 50%, #ffe5b4 100%)',
      'clear-day':       'linear-gradient(180deg, #4a90d9 0%, #87ceeb 50%, #b0e0e6 100%)',
      'clear-dusk':      'linear-gradient(180deg, #ff6b6b 0%, #c44569 50%, #6c5b7b 100%)',
      'clear-night':     'linear-gradient(180deg, #0a0e27 0%, #1a1a4e 50%, #2d2d6e 100%)',
      'cloudy-day':      'linear-gradient(180deg, #8e9eab 0%, #b8c6db 50%, #dee2e6 100%)',
      'overcast-day':    'linear-gradient(180deg, #606c88 0%, #3f4c6b 100%)',
      'rain-day':        'linear-gradient(180deg, #3a4a5c 0%, #5a6c7d 50%, #7a8c9d 100%)',
      'heavy-rain-day':  'linear-gradient(180deg, #1f2d3d 0%, #2c3e50 50%, #34495e 100%)',
      'snow-day':        'linear-gradient(180deg, #c8d6e5 0%, #dfe6e9 50%, #f5f6fa 100%)',
      'fog-day':         'linear-gradient(180deg, #b2bec3 0%, #dfe6e9 50%, #f1f2f6 100%)',
      'thunderstorm-day':'linear-gradient(180deg, #1e272e 0%, #2d3436 50%, #636e72 100%)',
    };
    const defaultGrad = 'linear-gradient(180deg, #2d5f5d 0%, #466b4c 50%, #7a9b7e 100%)';
    $bgFallback.style.background = gradients[State.weatherKey] || defaultGrad;
    $bgImage.style.opacity = '0';
  }

  function updateNightOverlay(period, weatherType) {
    if (period === 'night') {
      $nightOverlay.style.background = 'linear-gradient(180deg, rgba(10,20,50,0.35) 0%, rgba(15,25,60,0.25) 100%)';
    } else if (period === 'dusk') {
      $nightOverlay.style.background = 'linear-gradient(180deg, rgba(255,100,50,0.08) 0%, rgba(50,30,80,0.12) 100%)';
    } else {
      $nightOverlay.style.background = 'transparent';
    }
  }

  /* ---------- Canvas 粒子系统 ---------- */
  const Particles = {
    list: [],
    type: 'clear',
    lastFrame: 0,
    frameInterval: 1000 / 60,
    lightningTimer: 0,
    lightningActive: false,

    init(weatherType) {
      this.type = weatherType;
      this.list = [];
      const W = window.innerWidth;
      const H = window.innerHeight;
      const count = State.particleCount;

      switch (weatherType) {
        case 'clear':
          if (State.period === 'night') this.createStars(count);
          break;
        case 'cloudy':
        case 'overcast':
          this.createClouds(weatherType === 'overcast' ? 5 : 4);
          break;
        case 'fog':
          this.createFogBands(6);
          break;
        case 'drizzle':
          this.createRain(Math.floor(count * 0.5), 1, 6);
          break;
        case 'rain':
          this.createRain(count, 1.5, 12);
          break;
        case 'heavy-rain':
          this.createRain(Math.floor(count * 1.5), 2.5, 18);
          break;
        case 'snow':
          this.createSnow(count);
          break;
        case 'thunderstorm':
          this.createRain(Math.floor(count * 1.2), 2.5, 18);
          this.lightningTimer = 0;
          break;
      }
    },

    createRain(count, speedScale, length) {
      const W = window.innerWidth;
      for (let i = 0; i < count; i++) {
        this.list.push({
          kind: 'rain',
          x: Math.random() * W,
          y: Math.random() * window.innerHeight - 100,
          vx: -1 - Math.random() * 2,
          vy: 8 * speedScale + Math.random() * 4 * speedScale,
          len: length + Math.random() * 6,
          color: `rgba(180, 210, 230, ${0.3 + Math.random() * 0.4})`,
        });
      }
    },

    createSnow(count) {
      const W = window.innerWidth;
      for (let i = 0; i < count; i++) {
        this.list.push({
          kind: 'snow',
          x: Math.random() * W,
          y: Math.random() * window.innerHeight - 50,
          vx: -0.5 + Math.random(),
          vy: 0.8 + Math.random() * 1.5,
          r: 2 + Math.random() * 4,
          opacity: 0.6 + Math.random() * 0.4,
          drift: Math.random() * Math.PI * 2,
          driftSpeed: 0.01 + Math.random() * 0.02,
        });
      }
    },

    createClouds(count) {
      const W = window.innerWidth;
      for (let i = 0; i < count; i++) {
        this.list.push({
          kind: 'cloud',
          x: Math.random() * W,
          y: 30 + Math.random() * window.innerHeight * 0.4,
          vx: 0.2 + Math.random() * 0.3,
          w: 200 + Math.random() * 200,
          h: 60 + Math.random() * 40,
          opacity: 0.15 + Math.random() * 0.25,
        });
      }
    },

    createFogBands(count) {
      const H = window.innerHeight;
      for (let i = 0; i < count; i++) {
        this.list.push({
          kind: 'fog',
          x: -window.innerWidth,
          y: (i / count) * H + Math.random() * 40,
          vx: 0.3 + Math.random() * 0.4,
          w: window.innerWidth * 1.5,
          h: 80 + Math.random() * 40,
          opacity: 0.2 + Math.random() * 0.2,
        });
      }
    },

    createStars(count) {
      const W = window.innerWidth;
      const H = window.innerHeight;
      for (let i = 0; i < count; i++) {
        this.list.push({
          kind: 'star',
          x: Math.random() * W,
          y: Math.random() * H * 0.7,
          r: 0.5 + Math.random() * 1.5,
          opacity: 0.3 + Math.random() * 0.7,
          twinkle: Math.random() * Math.PI * 2,
          twinkleSpeed: 0.02 + Math.random() * 0.04,
        });
      }
    },

    triggerLightning() {
      this.lightningActive = true;
      $lightning.style.background = 'rgba(255, 255, 255, 0.6)';
      setTimeout(() => {
        $lightning.style.background = 'rgba(255, 255, 255, 0.3)';
        setTimeout(() => {
          $lightning.style.background = 'rgba(255, 255, 255, 0.5)';
          setTimeout(() => {
            $lightning.style.background = 'transparent';
            this.lightningActive = false;
          }, 80);
        }, 60);
      }, 100);
    },

    update(dt) {
      const W = window.innerWidth;
      const H = window.innerHeight;
      for (const p of this.list) {
        p.x += p.vx;
        p.y += p.vy || 0;
        if (p.kind === 'snow') {
          p.drift += p.driftSpeed;
          p.x += Math.sin(p.drift) * 0.5;
          if (p.y > H) { p.y = -10; p.x = Math.random() * W; }
          if (p.x < -10) p.x = W + 10;
          if (p.x > W + 10) p.x = -10;
        } else if (p.kind === 'rain') {
          if (p.y > H) { p.y = -20; p.x = Math.random() * W; }
        } else if (p.kind === 'cloud' || p.kind === 'fog') {
          if (p.x > W + p.w) p.x = -p.w;
        } else if (p.kind === 'star') {
          p.twinkle += p.twinkleSpeed;
        }
      }
      if (this.type === 'thunderstorm' && !this.lightningActive) {
        this.lightningTimer += dt;
        if (this.lightningTimer > 5000 + Math.random() * 8000) {
          this.triggerLightning();
          this.lightningTimer = 0;
        }
      }
    },

    draw() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      ctx.clearRect(0, 0, W, H);
      for (const p of this.list) {
        if (p.kind === 'rain') {
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x + p.vx, p.y + p.len);
          ctx.stroke();
        } else if (p.kind === 'snow') {
          ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.kind === 'cloud') {
          const grad = ctx.createRadialGradient(p.x + p.w/2, p.y + p.h/2, 0, p.x + p.w/2, p.y + p.h/2, p.w/2);
          grad.addColorStop(0, `rgba(255, 255, 255, ${p.opacity})`);
          grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.ellipse(p.x + p.w/2, p.y + p.h/2, p.w/2, p.h/2, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.kind === 'fog') {
          const grad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
          grad.addColorStop(0, 'rgba(220, 230, 240, 0)');
          grad.addColorStop(0.5, `rgba(220, 230, 240, ${p.opacity})`);
          grad.addColorStop(1, 'rgba(220, 230, 240, 0)');
          ctx.fillStyle = grad;
          ctx.fillRect(p.x, p.y, p.w, p.h);
        } else if (p.kind === 'star') {
          const alpha = p.opacity * (0.5 + 0.5 * Math.sin(p.twinkle));
          ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    },
  };

  function animate(timestamp) {
    const dt = timestamp - Particles.lastFrame;
    if (dt >= Particles.frameInterval) {
      Particles.lastFrame = timestamp - (dt % Particles.frameInterval);
      Particles.update(dt);
      Particles.draw();
    }
    requestAnimationFrame(animate);
  }

  /**
   * 计算当前背景亮度，用于父窗口字体颜色自适应
   * 返回 'light'（亮背景，需深色文字）或 'dark'（暗背景，需浅色文字）
   */
  function computeBrightness(weatherType, period) {
    // 夜晚 / 清晨 / 傍晚：背景偏暗 → 需浅色文字
    if (period === 'night' || period === 'dawn' || period === 'dusk') return 'dark';
    // 白天：暴雨 / 雷暴背景偏暗 → 需浅色文字
    if (weatherType === 'heavy-rain' || weatherType === 'thunderstorm') return 'dark';
    // 白天其余（晴/多云/阴/雾/小雨/雪）：背景偏亮 → 需深色文字
    return 'light';
  }

  /** 通知父窗口当前背景亮度，供 APP 字体颜色自适应 */
  function notifyBrightness(weatherType, period) {
    const brightness = computeBrightness(weatherType, period);
    try {
      // iframe 内向父窗口 postMessage（同源可直发；Capacitor 下 file:// 同源）
      window.parent?.postMessage({
        type: 'weather-theme-brightness',
        brightness,
        weatherType,
        period,
        weatherKey: `${weatherType}-${period}`,
      }, '*');
      debug(`亮度通知: ${brightness}`);
    } catch (e) {
      debug('亮度通知失败: ' + e.message);
    }
  }

  async function updateTheme() {
    if (!State.location) {
      debug('等待定位...');
      return;
    }
    const { latitude, longitude } = State.location;
    const weather = await fetchWeather(latitude, longitude);
    if (!weather) {
      State.weather = { type: 'clear', code: 0, temperature: 20, isDay: true };
      State.period = getTimePeriod(null, null, Date.now());
    } else {
      State.weather = weather;
      State.period = getTimePeriod(State.sunrise, State.sunset, Date.now());
    }
    debug(`主题: ${State.weather.type}-${State.period}`);
    await loadBackground(State.weather.type, State.period);
    updateNightOverlay(State.period, State.weather.type);
    Particles.init(State.weather.type);
    // 通知父窗口当前背景亮度，触发 APP 字体颜色自适应
    notifyBrightness(State.weather.type, State.period);
  }

  function startAutoRefresh() {
    if (State.refreshTimer) clearInterval(State.refreshTimer);
    State.refreshTimer = setInterval(updateTheme, CONFIG.weatherCacheTTL);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') updateTheme();
    });
  }

  window.WeatherTheme = {
    setLocation(lat, lng) {
      State.location = { latitude: lat, longitude: lng };
      debug(`定位: ${lat.toFixed(3)}, ${lng.toFixed(3)}`);
      updateTheme();
      startAutoRefresh();
    },
    setPexelsKey(key) {
      CONFIG.pexelsApiKey = key;
      debug('Pexels Key 已设置');
      if (State.weather) updateTheme();
    },
    refresh() { updateTheme(); },
    setDebug(enabled) {
      CONFIG.debug = !!enabled;
      $debug.style.display = enabled ? 'block' : 'none';
    },
  };

  async function fallbackGeolocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => window.WeatherTheme.setLocation(pos.coords.latitude, pos.coords.longitude),
        () => ipLocationFallback(),
        { timeout: 5000, maximumAge: 60000, enableHighAccuracy: false }
      );
    } else {
      ipLocationFallback();
    }
  }

  async function ipLocationFallback() {
    try {
      const resp = await fetch('https://ipapi.co/json/');
      if (resp.ok) {
        const data = await resp.json();
        if (data.latitude && data.longitude) {
          window.WeatherTheme.setLocation(data.latitude, data.longitude);
          return;
        }
      }
    } catch {}
    debug('定位失败，使用默认主题');
    State.weather = { type: 'clear', code: 0, temperature: 20, isDay: true };
    State.period = getTimePeriod(null, null, Date.now());
    loadBackground('clear', State.period);
    Particles.init('clear');
  }

  function init() {
    detectPerformance();
    resizeCanvas();

    // 从 URL fragment 读取 Pexels Key 和 debug 开关
    try {
      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const key = params.get('pexels_key');
      if (key) {
        CONFIG.pexelsApiKey = key;
        debug('Pexels Key 从 URL fragment 注入');
      }
      const dbg = params.get('debug');
      if (dbg === '1') {
        CONFIG.debug = true;
        $debug.style.display = 'block';
        debug('调试模式已开启');
      }
    } catch (e) {
      debug('解析参数失败: ' + e.message);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      Particles.init(State.weather?.type || 'clear');
    });
    requestAnimationFrame(animate);

    // 立即自主定位（不等安卓注入）
    setTimeout(() => {
      if (!State.location) {
        debug('自主定位');
        fallbackGeolocation();
      }
    }, 500);

    debug('WeatherTheme 已启动');
  }

  init();
})();
</script>
</body>
</html>
